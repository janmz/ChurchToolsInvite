name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.22"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run checks
        run: bash scripts/ci.sh

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Resolve version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u '+%Y-%m-%d %H:%M:%S')" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          BINARY="churchtools-invite"
          if [ "$GOOS" = "windows" ]; then
            BINARY="${BINARY}.exe"
          fi

          PACKAGE="churchtools-invite-${{ steps.version.outputs.tag }}-${GOOS}-${GOARCH}"
          mkdir -p "dist/${PACKAGE}"
          LDFLAGS="-s -w -X main.Version=${{ steps.version.outputs.version }} -X 'main.BuildTime=${{ steps.version.outputs.build_time }}'"

          go build -ldflags "$LDFLAGS" -o "dist/${PACKAGE}/${BINARY}" .

          cp README.md LICENSE "dist/${PACKAGE}/"

          cd dist
          if [ "$GOOS" = "windows" ]; then
            zip -r "${PACKAGE}.zip" "${PACKAGE}"
          else
            tar -czf "${PACKAGE}.tar.gz" "${PACKAGE}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: churchtools-invite-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.{tar.gz,zip}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
